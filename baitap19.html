<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Memory Card Flip Game</title>
  <style>
    body {
    font-family: Arial;
    text-align: center;
    margin: 0;
    background: #f5f5f5;
    }

    header{
    background: #333;
    color: white;
    padding: 10px;
    }

    .controls {
    margin: 15px;
    }

    .game-board {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    max-width: 500px;
    margin: auto;
    padding: 10px;
    }

    /* Responsive */
    @media (max-width: 600px) {
    .game-board {
        grid-template-columns: repeat(2, 1fr);
    }
    }

    /* Card */
    .card {
    perspective: 1000px;
    height: 100px;
    cursor: pointer;
    }

    .card-inner {
    width: 100%;
    height: 100%;
    position: relative;
    transition: transform 0.6s;
    transform-style: preserve-3d;
    }

    .card.flip .card-inner {
    transform: rotateY(180deg);
    }

    /* Front & Back */
    .card-front, .card-back {
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 10px;
    backface-visibility: hidden;
    }

    .card-front {
    background: #4CAF50;
    }

    .card-back {
    background: white;
    transform: rotateY(180deg);
    font-size: 30px;
    display: flex;
    justify-content: center;
    align-items: center;
    }

    /* Hover */
    .card:hover {
    transform: scale(1.05);
    }
  </style>
  <script>
    const symbols = ["🍎","🍌","🍇","🍒"];
    let cards = [...symbols, ...symbols]; // 4 cặp
    let firstCard = null;
    let secondCard = null;
    let lockBoard = false;
    let moves = 0;

    // Shuffle
    function shuffle(array) {
    return array.sort(() => Math.random() - 0.5);
    }

    // Render cards
    function initGame() {
    const board = document.getElementById("gameBoard");
    board.innerHTML = "";
    cards = shuffle(cards);

    cards.forEach((symbol, index) => {
        const card = document.createElement("div");
        card.classList.add("card");
        card.dataset.symbol = symbol;

        card.innerHTML = `
        <div class="card-inner">
            <div class="card-front"></div>
            <div class="card-back">${symbol}</div>
        </div>
        `;

        card.addEventListener("click", () => flipCard(card));
        board.appendChild(card);
    });
    }

    // Flip logic
    function flipCard(card) {
    if (lockBoard || card === firstCard || card.classList.contains("matched")) return;

    card.classList.add("flip");

    if (!firstCard) {
        firstCard = card;
        return;
    }

    secondCard = card;
    moves++;
    document.getElementById("moves").innerText = moves;

    checkMatch();
    }

    // Check match
    function checkMatch() {
    if (firstCard.dataset.symbol === secondCard.dataset.symbol) {
        firstCard.classList.add("matched");
        secondCard.classList.add("matched");

        resetTurn();
        checkWin();
    } else {
        lockBoard = true;
        setTimeout(() => {
        firstCard.classList.remove("flip");
        secondCard.classList.remove("flip");
        resetTurn();
        }, 800);
    }
    }

    // Reset turn
    function resetTurn() {
    [firstCard, secondCard] = [null, null];
    lockBoard = false;
    }

    // Check win
    function checkWin() {
    const matched = document.querySelectorAll(".matched");
    if (matched.length === cards.length) {
        setTimeout(() => {
        alert("🎉 Bạn đã thắng!");
        }, 300);
    }
    }

    // Reset game
    function resetGame() {
    moves = 0;
    document.getElementById("moves").innerText = moves;
    initGame();
    }

    // Start
    initGame();
  </script>
</head>
<body>

<header>
  <h1>Memory Card Flip Game</h1>
</header>

<main>
  <section class="controls">
    <p>Lượt: <span id="moves">0</span></p>
    <button onclick="resetGame()">🔄 Reset</button>
  </section>

  <section class="game-board" id="gameBoard">
    <!-- Cards sẽ render bằng JS -->
  </section>
</main>

<script src="script.js"></script>
</body>
</html>
